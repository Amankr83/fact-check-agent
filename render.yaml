services:
  - type: web
    name: fast-check-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: FACT_CHECK_MAX_CLAIMS
        value: "12"
      - key: FACT_CHECK_MAX_EVIDENCE
        value: "5"
